workflows:
  ios-simulator-workflow:
    name: MineConsole iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build iOS Simulator App
        script: |
          xcodebuild \
            -project MineConsole.xcodeproj \
            -scheme MineConsole \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            clean build
    artifacts:
      - build/Build/Products/Debug-iphonesimulator/*.app

  ios-sideload-workflow:
    name: MineConsole iOS Sideload Build (Unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Build Unsigned iOS App (Physical Device)
        script: |
          rm -rf build/
          xcodebuild clean build \
            -project MineConsole.xcodeproj \
            -scheme MineConsole \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""
          
          echo "Compiling Asset Catalog manually via actool..."
          xcrun actool MineConsole-iOS/Assets.xcassets \
            --compile build/DerivedData/Build/Products/Release-iphoneos/MineConsole.app \
            --platform iphoneos \
            --minimum-deployment-target 17.0 \
            --app-icon AppIcon \
            --output-partial-info-plist build/partial-info.plist
      - name: Package Unsigned IPA
        script: |
          mkdir -p build/Payload
          cp -r build/DerivedData/Build/Products/Release-iphoneos/MineConsole.app build/Payload/
          cd build
          zip -r MineConsole.ipa Payload
    artifacts:
      - build/MineConsole.ipa


  ios-device-workflow:
    name: MineConsole iOS Physical Device Build (IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      # If using automatic signing, Codemagic requires your App Store Connect credentials set as environment variables.
      # You can configure these in the Codemagic Web UI (Application settings > Environment variables).
      # APP_STORE_CONNECT_KEY_IDENTIFIER
      # APP_STORE_CONNECT_ISSUER_ID
      # APP_STORE_CONNECT_PRIVATE_KEY
    scripts:
      - name: Install XcodeGen
        script: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Set up code signing settings
        script: |
          # If App Store Connect API credentials are provided, fetch signing files automatically
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "Warning: APP_STORE_CONNECT_PRIVATE_KEY not set. Building unsigned IPA or Xcode may fail."
          else
            keychain initialize
            app-store-connect fetch-signing-files "com.raul1x9.MineConsole" --create
            keychain add-certificates
          fi
      - name: Build iOS IPA Package
        script: |
          xcode-project build-ipa \
            -workspace MineConsole.xcodeproj/project.xcworkspace \
            -scheme MineConsole
    artifacts:
      - build/ios/ipa/*.ipa
